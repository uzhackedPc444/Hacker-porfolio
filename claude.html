<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>NEON DRIFT - Synthwave Space Shooter</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');

        body {
            overflow: hidden;
            background: #0a0015;
            font-family: 'Orbitron', 'Segoe UI', sans-serif;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }

        #game-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        canvas {
            display: block;
        }

        #hud {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 100;
            pointer-events: none;
        }

        #score-label {
            font-size: 12px;
            color: #00ffff;
            text-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff;
            letter-spacing: 4px;
            margin-bottom: 5px;
        }

        #score {
            font-size: 42px;
            font-weight: 900;
            color: #ff00ff;
            text-shadow: 0 0 10px #ff00ff, 0 0 30px #ff00ff, 0 0 50px #ff00ff;
        }

        #title {
            position: fixed;
            top: 20px;
            right: 20px;
            font-size: 14px;
            color: #ff0066;
            text-shadow: 0 0 10px #ff0066;
            letter-spacing: 3px;
            z-index: 100;
            pointer-events: none;
        }

        #game-over {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 0, 21, 0.92);
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 200;
            backdrop-filter: blur(5px);
        }

        #game-over h1 {
            font-size: 64px;
            font-weight: 900;
            color: #ff0066;
            text-shadow: 0 0 20px #ff0066, 0 0 40px #ff0066, 0 0 80px #ff0066;
            margin-bottom: 20px;
            animation: glitch 0.3s infinite;
            letter-spacing: 8px;
        }

        @keyframes glitch {

            0%,
            100% {
                transform: translate(0);
            }

            20% {
                transform: translate(-2px, 2px);
            }

            40% {
                transform: translate(2px, -2px);
            }

            60% {
                transform: translate(-1px, -1px);
            }

            80% {
                transform: translate(1px, 1px);
            }
        }

        #final-score {
            font-size: 28px;
            color: #00ffff;
            text-shadow: 0 0 15px #00ffff, 0 0 30px #00ffff;
            margin-bottom: 50px;
            letter-spacing: 3px;
        }

        #restart-btn {
            padding: 18px 50px;
            font-size: 20px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            background: linear-gradient(135deg, rgba(255, 0, 255, 0.2) 0%, rgba(0, 255, 255, 0.2) 100%);
            border: 2px solid #ff00ff;
            color: #ff00ff;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 6px;
            transition: all 0.3s ease;
            text-shadow: 0 0 10px #ff00ff;
            box-shadow: 0 0 30px rgba(255, 0, 255, 0.4), inset 0 0 30px rgba(255, 0, 255, 0.1);
            position: relative;
            overflow: hidden;
        }

        #restart-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s;
        }

        #restart-btn:hover::before {
            left: 100%;
        }

        #restart-btn:hover {
            background: linear-gradient(135deg, rgba(255, 0, 255, 0.4) 0%, rgba(0, 255, 255, 0.4) 100%);
            box-shadow: 0 0 50px rgba(255, 0, 255, 0.6), inset 0 0 50px rgba(255, 0, 255, 0.2);
            transform: scale(1.05);
        }

        #joystick-container {
            position: fixed;
            bottom: 40px;
            left: 40px;
            width: 140px;
            height: 140px;
            z-index: 100;
            display: none;
        }

        #joystick-base {
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(255, 0, 255, 0.25) 0%, rgba(255, 0, 255, 0.08) 60%, transparent 100%);
            border: 2px solid rgba(255, 0, 255, 0.6);
            border-radius: 50%;
            position: relative;
            box-shadow: 0 0 30px rgba(255, 0, 255, 0.3), inset 0 0 30px rgba(255, 0, 255, 0.1);
        }

        #joystick-stick {
            width: 55px;
            height: 55px;
            background: radial-gradient(circle, rgba(0, 255, 255, 0.9) 0%, rgba(0, 255, 255, 0.5) 100%);
            border: 2px solid #00ffff;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 25px rgba(0, 255, 255, 0.6), inset 0 0 15px rgba(255, 255, 255, 0.3);
            transition: box-shadow 0.1s;
        }

        #joystick-stick.active {
            box-shadow: 0 0 40px rgba(0, 255, 255, 0.9), inset 0 0 20px rgba(255, 255, 255, 0.5);
        }

        #fire-zone {
            position: fixed;
            bottom: 40px;
            right: 40px;
            width: 90px;
            height: 90px;
            z-index: 100;
            display: none;
            background: radial-gradient(circle, rgba(255, 0, 102, 0.3) 0%, rgba(255, 0, 102, 0.1) 60%, transparent 100%);
            border: 2px solid rgba(255, 0, 102, 0.7);
            border-radius: 50%;
            justify-content: center;
            align-items: center;
            font-size: 11px;
            font-weight: 700;
            color: #ff0066;
            text-shadow: 0 0 10px #ff0066;
            letter-spacing: 2px;
            box-shadow: 0 0 30px rgba(255, 0, 102, 0.3);
            transition: all 0.1s;
        }

        #fire-zone.active {
            background: radial-gradient(circle, rgba(255, 0, 102, 0.5) 0%, rgba(255, 0, 102, 0.2) 60%, transparent 100%);
            box-shadow: 0 0 50px rgba(255, 0, 102, 0.6);
            transform: scale(0.95);
        }

        .mobile #joystick-container,
        .mobile #fire-zone {
            display: flex;
        }

        #instructions {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 0, 255, 0.5);
            font-size: 11px;
            letter-spacing: 2px;
            z-index: 100;
            pointer-events: none;
            text-align: center;
        }

        .mobile #instructions {
            display: none;
        }

        #loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0015;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            flex-direction: column;
        }

        #loading h2 {
            color: #ff00ff;
            font-size: 24px;
            text-shadow: 0 0 20px #ff00ff;
            letter-spacing: 8px;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }
        }

        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 150;
            background: repeating-linear-gradient(0deg,
                    rgba(0, 0, 0, 0.1) 0px,
                    rgba(0, 0, 0, 0.1) 1px,
                    transparent 1px,
                    transparent 3px);
            opacity: 0.3;
        }
    </style>
</head>

<body>
    <div id="loading">
        <h2>LOADING</h2>
    </div>

    <div id="game-container"></div>
    <div class="scanlines"></div>

    <div id="hud">
        <div id="score-label">SCORE</div>
        <div id="score">0</div>
    </div>

    <div id="title">NEON DRIFT</div>

    <div id="instructions">WASD / ARROWS TO MOVE • SPACE TO FIRE</div>

    <div id="game-over">
        <h1>GAME OVER</h1>
        <div id="final-score">SCORE: 0</div>
        <button id="restart-btn">RESTART</button>
    </div>

    <div id="joystick-container">
        <div id="joystick-base">
            <div id="joystick-stick"></div>
        </div>
    </div>

    <div id="fire-zone">FIRE</div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';

        // Hide loading screen
        setTimeout(() => {
            document.getElementById('loading').style.display = 'none';
        }, 1500);

        // Game State
        let score = 0;
        let gameActive = true;
        let isMobile = false;
        let difficulty = 1;

        // Input State
        const keys = {};
        const joystickState = { x: 0, y: 0 };
        let firePressed = false;
        let lastFireTime = 0;
        const fireRate = 120;

        // Object Pools
        const laserPool = [];
        const particlePool = [];
        const enemyPool = [];
        const activeLasers = [];
        const activeParticles = [];
        const activeEnemies = [];

        // Three.js Setup
        const container = document.getElementById('game-container');
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x0a0015, 0.006);

        const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 4, 18);
        camera.lookAt(0, 0, -50);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.toneMapping = THREE.ReinhardToneMapping;
        renderer.toneMappingExposure = 1.8;
        renderer.outputColorSpace = THREE.SRGBColorSpace;
        container.appendChild(renderer.domElement);

        // Post-processing
        const composer = new EffectComposer(renderer);
        const renderPass = new RenderPass(scene, camera);
        composer.addPass(renderPass);

        const bloomPass = new UnrealBloomPass(
            new THREE.Vector2(window.innerWidth, window.innerHeight),
            1.8,
            0.5,
            0.75
        );
        composer.addPass(bloomPass);

        // Chromatic Aberration Shader
        const chromaticAberrationShader = {
            uniforms: {
                tDiffuse: { value: null },
                amount: { value: 0.003 }
            },
            vertexShader: `
                varying vec2 vUv;
                void main() {
                    vUv = uv;
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }
            `,
            fragmentShader: `
                uniform sampler2D tDiffuse;
                uniform float amount;
                varying vec2 vUv;
                void main() {
                    vec2 dir = vUv - vec2(0.5);
                    float dist = length(dir);
                    vec2 offset = dir * dist * amount;
                    vec4 cr = texture2D(tDiffuse, vUv + offset);
                    vec4 cg = texture2D(tDiffuse, vUv);
                    vec4 cb = texture2D(tDiffuse, vUv - offset);
                    gl_FragColor = vec4(cr.r, cg.g, cb.b, 1.0);
                }
            `
        };

        const chromaticPass = new ShaderPass(chromaticAberrationShader);
        composer.addPass(chromaticPass);

        // Advanced Starfield with shader
        const starfieldVertexShader = `
            attribute float size;
            attribute vec3 customColor;
            attribute float twinkleSpeed;
            attribute float twinkleOffset;
            varying vec3 vColor;
            varying float vTwinkle;
            uniform float time;
            
            void main() {
                vColor = customColor;
                vTwinkle = 0.6 + 0.4 * sin(time * twinkleSpeed + twinkleOffset);
                vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                gl_PointSize = size * (350.0 / -mvPosition.z) * vTwinkle;
                gl_Position = projectionMatrix * mvPosition;
            }
        `;

        const starfieldFragmentShader = `
            varying vec3 vColor;
            varying float vTwinkle;
            
            void main() {
                float dist = length(gl_PointCoord - vec2(0.5));
                if (dist > 0.5) discard;
                
                float core = 1.0 - smoothstep(0.0, 0.2, dist);
                float glow = 1.0 - smoothstep(0.0, 0.5, dist);
                
                vec3 finalColor = vColor * glow + vec3(1.0) * core * 0.5;
                float alpha = glow * vTwinkle;
                
                gl_FragColor = vec4(finalColor, alpha);
            }
        `;

        function createStarfield() {
            const starCount = 4000;
            const positions = new Float32Array(starCount * 3);
            const colors = new Float32Array(starCount * 3);
            const sizes = new Float32Array(starCount);
            const twinkleSpeeds = new Float32Array(starCount);
            const twinkleOffsets = new Float32Array(starCount);

            const colorPalette = [
                new THREE.Color(0xff00ff),
                new THREE.Color(0x00ffff),
                new THREE.Color(0xff0066),
                new THREE.Color(0x8800ff),
                new THREE.Color(0xffffff),
                new THREE.Color(0xff6600)
            ];

            for (let i = 0; i < starCount; i++) {
                const i3 = i * 3;
                const radius = 200 + Math.random() * 400;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.random() * Math.PI;

                positions[i3] = radius * Math.sin(phi) * Math.cos(theta);
                positions[i3 + 1] = (Math.random() - 0.3) * 300;
                positions[i3 + 2] = -50 - Math.random() * 500;

                const color = colorPalette[Math.floor(Math.random() * colorPalette.length)];
                colors[i3] = color.r;
                colors[i3 + 1] = color.g;
                colors[i3 + 2] = color.b;

                sizes[i] = Math.random() * 4 + 1;
                twinkleSpeeds[i] = Math.random() * 5 + 1;
                twinkleOffsets[i] = Math.random() * Math.PI * 2;
            }

            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('customColor', new THREE.BufferAttribute(colors, 3));
            geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
            geometry.setAttribute('twinkleSpeed', new THREE.BufferAttribute(twinkleSpeeds, 1));
            geometry.setAttribute('twinkleOffset', new THREE.BufferAttribute(twinkleOffsets, 1));

            const material = new THREE.ShaderMaterial({
                uniforms: { time: { value: 0 } },
                vertexShader: starfieldVertexShader,
                fragmentShader: starfieldFragmentShader,
                transparent: true,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });

            return new THREE.Points(geometry, material);
        }

        const starfield = createStarfield();
        scene.add(starfield);

        // Nebula Background
        const nebulaGeometry = new THREE.PlaneGeometry(800, 600);
        const nebulaFragmentShader = `
            uniform float time;
            varying vec2 vUv;
            
            vec3 mod289(vec3 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
            vec4 mod289(vec4 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
            vec4 permute(vec4 x) { return mod289(((x*34.0)+1.0)*x); }
            vec4 taylorInvSqrt(vec4 r) { return 1.79284291400159 - 0.85373472095314 * r; }
            
            float snoise(vec3 v) {
                const vec2 C = vec2(1.0/6.0, 1.0/3.0);
                const vec4 D = vec4(0.0, 0.5, 1.0, 2.0);
                
                vec3 i = floor(v + dot(v, C.yyy));
                vec3 x0 = v - i + dot(i, C.xxx);
                
                vec3 g = step(x0.yzx, x0.xyz);
                vec3 l = 1.0 - g;
                vec3 i1 = min(g.xyz, l.zxy);
                vec3 i2 = max(g.xyz, l.zxy);
                
                vec3 x1 = x0 - i1 + C.xxx;
                vec3 x2 = x0 - i2 + C.yyy;
                vec3 x3 = x0 - D.yyy;
                
                i = mod289(i);
                vec4 p = permute(permute(permute(
                    i.z + vec4(0.0, i1.z, i2.z, 1.0))
                    + i.y + vec4(0.0, i1.y, i2.y, 1.0))
                    + i.x + vec4(0.0, i1.x, i2.x, 1.0));
                    
                float n_ = 0.142857142857;
                vec3 ns = n_ * D.wyz - D.xzx;
                
                vec4 j = p - 49.0 * floor(p * ns.z * ns.z);
                
                vec4 x_ = floor(j * ns.z);
                vec4 y_ = floor(j - 7.0 * x_);
                
                vec4 x = x_ *ns.x + ns.yyyy;
                vec4 y = y_ *ns.x + ns.yyyy;
                vec4 h = 1.0 - abs(x) - abs(y);
                
                vec4 b0 = vec4(x.xy, y.xy);
                vec4 b1 = vec4(x.zw, y.zw);
                
                vec4 s0 = floor(b0)*2.0 + 1.0;
                vec4 s1 = floor(b1)*2.0 + 1.0;
                vec4 sh = -step(h, vec4(0.0));
                
                vec4 a0 = b0.xzyw + s0.xzyw*sh.xxyy;
                vec4 a1 = b1.xzyw + s1.xzyw*sh.zzww;
                
                vec3 p0 = vec3(a0.xy, h.x);
                vec3 p1 = vec3(a0.zw, h.y);
                vec3 p2 = vec3(a1.xy, h.z);
                vec3 p3 = vec3(a1.zw, h.w);
                
                vec4 norm = taylorInvSqrt(vec4(dot(p0,p0), dot(p1,p1), dot(p2,p2), dot(p3,p3)));
                p0 *= norm.x;
                p1 *= norm.y;
                p2 *= norm.z;
                p3 *= norm.w;
                
                vec4 m = max(0.6 - vec4(dot(x0,x0), dot(x1,x1), dot(x2,x2), dot(x3,x3)), 0.0);
                m = m * m;
                return 42.0 * dot(m*m, vec4(dot(p0,x0), dot(p1,x1), dot(p2,x2), dot(p3,x3)));
            }
            
            float fbm(vec3 p) {
                float value = 0.0;
                float amplitude = 0.5;
                for (int i = 0; i < 6; i++) {
                    value += amplitude * snoise(p);
                    p *= 2.0;
                    amplitude *= 0.5;
                }
                return value;
            }
            
            void main() {
                vec2 uv = vUv * 2.0 - 1.0;
                
                float n1 = fbm(vec3(uv * 1.5, time * 0.03));
                float n2 = fbm(vec3(uv * 2.0 + 100.0, time * 0.02));
                float n3 = fbm(vec3(uv * 3.0 + 200.0, time * 0.04));
                
                vec3 purple = vec3(0.3, 0.0, 0.5);
                vec3 pink = vec3(0.8, 0.0, 0.4);
                vec3 cyan = vec3(0.0, 0.6, 0.8);
                vec3 orange = vec3(0.8, 0.3, 0.0);
                
                vec3 color = mix(purple, pink, smoothstep(-0.3, 0.5, n1));
                color = mix(color, cyan, smoothstep(0.0, 0.6, n2) * 0.5);
                color = mix(color, orange, smoothstep(0.2, 0.8, n3) * 0.3);
                
                float vignette = 1.0 - length(uv) * 0.4;
                color *= vignette * 0.25;
                
                gl_FragColor = vec4(color, 1.0);
            }
        `;

        const nebulaMaterial = new THREE.ShaderMaterial({
            uniforms: { time: { value: 0 } },
            vertexShader: `
                varying vec2 vUv;
                void main() {
                    vUv = uv;
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }
            `,
            fragmentShader: nebulaFragmentShader,
            side: THREE.DoubleSide
        });

        const nebula = new THREE.Mesh(nebulaGeometry, nebulaMaterial);
        nebula.position.z = -350;
        scene.add(nebula);

        // Retro Sun
        const sunGeometry = new THREE.CircleGeometry(50, 64);
        const sunFragmentShader = `
            uniform float time;
            varying vec2 vUv;
            
            void main() {
                vec2 uv = vUv * 2.0 - 1.0;
                float dist = length(uv);
                
                if (dist > 1.0) discard;
                
                vec3 topColor = vec3(1.0, 0.6, 0.0);
                vec3 bottomColor = vec3(1.0, 0.0, 0.5);
                vec3 sunColor = mix(bottomColor, topColor, vUv.y);
                
                // Horizontal scan lines
                float lines = step(0.5, fract((1.0 - vUv.y) * 15.0 - time * 0.5));
                float lineMask = smoothstep(0.0, 0.5, 1.0 - vUv.y);
                sunColor *= 1.0 - lines * lineMask * 0.4;
                
                // Edge glow
                float edge = smoothstep(0.7, 1.0, dist);
                sunColor += vec3(1.0, 0.3, 0.5) * edge * 0.5;
                
                // Center glow
                float center = 1.0 - smoothstep(0.0, 0.8, dist);
                sunColor += vec3(1.0, 0.8, 0.5) * center * 0.3;
                
                gl_FragColor = vec4(sunColor, 1.0 - edge * 0.5);
            }
        `;

        const sunMaterial = new THREE.ShaderMaterial({
            uniforms: { time: { value: 0 } },
            vertexShader: `
                varying vec2 vUv;
                void main() {
                    vUv = uv;
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }
            `,
            fragmentShader: sunFragmentShader,
            transparent: true,
            side: THREE.DoubleSide
        });

        const sun = new THREE.Mesh(sunGeometry, sunMaterial);
        sun.position.set(0, 25, -280);
        scene.add(sun);

        // Sun glow
        const glowGeometry = new THREE.CircleGeometry(70, 64);
        const glowMaterial = new THREE.ShaderMaterial({
            uniforms: { time: { value: 0 } },
            vertexShader: `
                varying vec2 vUv;
                void main() {
                    vUv = uv;
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }
            `,
            fragmentShader: `
                varying vec2 vUv;
                void main() {
                    vec2 uv = vUv * 2.0 - 1.0;
                    float dist = length(uv);
                    float alpha = smoothstep(1.0, 0.3, dist) * 0.3;
                    vec3 color = mix(vec3(1.0, 0.0, 0.5), vec3(1.0, 0.5, 0.0), vUv.y);
                    gl_FragColor = vec4(color, alpha);
                }
            `,
            transparent: true,
            blending: THREE.AdditiveBlending,
            depthWrite: false
        });

        const sunGlow = new THREE.Mesh(glowGeometry, glowMaterial);
        sunGlow.position.set(0, 25, -281);
        scene.add(sunGlow);

        // Animated Grid Floor
        const gridVertexShader = `
            varying vec2 vUv;
            varying float vFog;
            uniform float time;
            
            void main() {
                vUv = uv;
                vec3 pos = position;
                pos.z += time * 20.0;
                pos.z = mod(pos.z + 100.0, 200.0) - 100.0;
                
                vec4 mvPosition = modelViewMatrix * vec4(pos, 1.0);
                vFog = smoothstep(-50.0, -200.0, mvPosition.z);
                gl_Position = projectionMatrix * mvPosition;
            }
        `;

        const gridFragmentShader = `
            varying vec2 vUv;
            varying float vFog;
            uniform float time;
            
            void main() {
                vec2 grid = abs(fract(vUv * 30.0 - 0.5) - 0.5) / fwidth(vUv * 30.0);
                float line = min(grid.x, grid.y);
                float gridAlpha = 1.0 - min(line, 1.0);
                
                vec3 color = mix(vec3(0.4, 0.0, 0.6), vec3(1.0, 0.0, 1.0), gridAlpha);
                float alpha = gridAlpha * 0.6 * (1.0 - vFog);
                
                gl_FragColor = vec4(color, alpha);
            }
        `;

        const gridGeometry = new THREE.PlaneGeometry(400, 200, 1, 1);
        const gridMaterial = new THREE.ShaderMaterial({
            uniforms: { time: { value: 0 } },
            vertexShader: gridVertexShader,
            fragmentShader: gridFragmentShader,
            transparent: true,
            side: THREE.DoubleSide,
            depthWrite: false
        });

        const grid = new THREE.Mesh(gridGeometry, gridMaterial);
        grid.rotation.x = -Math.PI / 2;
        grid.position.y = -12;
        grid.position.z = -50;
        scene.add(grid);

        // Create Spaceship
        function createSpaceship() {
            const group = new THREE.Group();

            // Main fuselage
            const bodyGeometry = new THREE.ConeGeometry(0.6, 4, 6);
            const bodyMaterial = new THREE.MeshBasicMaterial({ color: 0x00ffff });
            const body = new THREE.Mesh(bodyGeometry, bodyMaterial);
            body.rotation.x = Math.PI / 2;
            body.position.z = 0.5;
            group.add(body);

            // Body edges glow
            const bodyEdges = new THREE.EdgesGeometry(bodyGeometry);
            const bodyLine = new THREE.LineSegments(bodyEdges, new THREE.LineBasicMaterial({ color: 0x00ffff }));
            bodyLine.rotation.x = Math.PI / 2;
            bodyLine.position.z = 0.5;
            group.add(bodyLine);

            // Wings
            const wingShape = new THREE.Shape();
            wingShape.moveTo(0, 0);
            wingShape.lineTo(2.5, -0.8);
            wingShape.lineTo(2.2, 0);
            wingShape.lineTo(2.5, 0.3);
            wingShape.lineTo(0, 0.5);
            wingShape.lineTo(0, 0);

            const wingGeometry = new THREE.ExtrudeGeometry(wingShape, { depth: 0.1, bevelEnabled: false });
            const wingMaterial = new THREE.MeshBasicMaterial({ color: 0xff00ff });

            const leftWing = new THREE.Mesh(wingGeometry, wingMaterial);
            leftWing.rotation.y = Math.PI / 2;
            leftWing.rotation.z = -0.1;
            leftWing.position.set(-0.3, 0, 1);
            group.add(leftWing);

            const rightWing = new THREE.Mesh(wingGeometry, wingMaterial);
            rightWing.rotation.y = -Math.PI / 2;
            rightWing.rotation.z = 0.1;
            rightWing.position.set(0.3, 0, 1);
            rightWing.scale.x = -1;
            group.add(rightWing);

            // Cockpit
            const cockpitGeometry = new THREE.SphereGeometry(0.35, 16, 12);
            const cockpitMaterial = new THREE.MeshBasicMaterial({ color: 0xff0066 });
            const cockpit = new THREE.Mesh(cockpitGeometry, cockpitMaterial);
            cockpit.scale.z = 1.5;
            cockpit.position.z = -0.5;
            cockpit.position.y = 0.15;
            group.add(cockpit);

            // Engine housings
            const engineGeometry = new THREE.CylinderGeometry(0.25, 0.35, 0.8, 8);
            const engineMaterial = new THREE.MeshBasicMaterial({ color: 0x8800ff });

            const leftEngine = new THREE.Mesh(engineGeometry, engineMaterial);
            leftEngine.rotation.x = Math.PI / 2;
            leftEngine.position.set(-0.8, -0.1, 2);
            group.add(leftEngine);

            const rightEngine = new THREE.Mesh(engineGeometry, engineMaterial);
            rightEngine.rotation.x = Math.PI / 2;
            rightEngine.position.set(0.8, -0.1, 2);
            group.add(rightEngine);

            // Engine trails
            const trailGeometry = new THREE.ConeGeometry(0.2, 1.5, 8);
            const trailMaterial = new THREE.MeshBasicMaterial({
                color: 0xff6600,
                transparent: true,
                opacity: 0.8
            });

            const leftTrail = new THREE.Mesh(trailGeometry, trailMaterial.clone());
            leftTrail.rotation.x = -Math.PI / 2;
            leftTrail.position.set(-0.8, -0.1, 3.2);
            group.add(leftTrail);
            group.userData.leftTrail = leftTrail;

            const rightTrail = new THREE.Mesh(trailGeometry, trailMaterial.clone());
            rightTrail.rotation.x = -Math.PI / 2;
            rightTrail.position.set(0.8, -0.1, 3.2);
            group.add(rightTrail);
            group.userData.rightTrail = rightTrail;

            return group;
        }

        const spaceship = createSpaceship();
        spaceship.position.set(0, 0, 8);
        scene.add(spaceship);

        let shipTargetX = 0;
        let shipTargetY = 0;
        let shipVelX = 0;
        let shipVelY = 0;

        // Create Laser
        function createLaser() {
            const group = new THREE.Group();

            const coreGeometry = new THREE.CylinderGeometry(0.04, 0.04, 4, 6);
            const coreMaterial = new THREE.MeshBasicMaterial({ color: 0xffffff });
            const core = new THREE.Mesh(coreGeometry, coreMaterial);
            core.rotation.x = Math.PI / 2;
            group.add(core);

            const glowGeometry = new THREE.CylinderGeometry(0.12, 0.12, 4, 6);
            const glowMaterial = new THREE.MeshBasicMaterial({
                color: 0x00ffff,
                transparent: true,
                opacity: 0.6
            });
            const glow = new THREE.Mesh(glowGeometry, glowMaterial);
            glow.rotation.x = Math.PI / 2;
            group.add(glow);

            group.visible = false;
            return group;
        }

        // Initialize laser pool
        for (let i = 0; i < 60; i++) {
            const laser = createLaser();
            scene.add(laser);
            laserPool.push(laser);
        }

        function fireLaser() {
            const now = Date.now();
            if (now - lastFireTime < fireRate) return;
            lastFireTime = now;

            // Fire two lasers from wing positions
            [-0.8, 0.8].forEach(offset => {
                let laser = laserPool.pop();
                if (!laser) {
                    laser = createLaser();
                    scene.add(laser);
                }

                laser.position.set(
                    spaceship.position.x + offset,
                    spaceship.position.y - 0.1,
                    spaceship.position.z - 2
                );
                laser.visible = true;
                laser.userData.speed = 3;
                activeLasers.push(laser);
            });
        }

        // Create Enemy
        function createEnemy() {
            const group = new THREE.Group();

            const type = Math.floor(Math.random() * 3);
            let geometry;

            if (type === 0) {
                geometry = new THREE.BoxGeometry(1.5, 1.5, 1.5);
            } else if (type === 1) {
                geometry = new THREE.OctahedronGeometry(1);
            } else {
                geometry = new THREE.TetrahedronGeometry(1.2);
            }

            const colors = [0xff00ff, 0x00ffff, 0xff0066, 0x8800ff];
            const color = colors[Math.floor(Math.random() * colors.length)];

            const material = new THREE.MeshBasicMaterial({
                color: color,
                transparent: true,
                opacity: 0.7
            });
            const mesh = new THREE.Mesh(geometry, material);
            group.add(mesh);

            const edges = new THREE.EdgesGeometry(geometry);
            const lineMaterial = new THREE.LineBasicMaterial({ color: 0xffffff });
            const wireframe = new THREE.LineSegments(edges, lineMaterial);
            group.add(wireframe);

            // Inner glow
            const innerGeometry = geometry.clone();
            const innerMaterial = new THREE.MeshBasicMaterial({
                color: color,
                transparent: true,
                opacity: 0.3
            });
            const inner = new THREE.Mesh(innerGeometry, innerMaterial);
            inner.scale.setScalar(1.3);
            group.add(inner);

            group.visible = false;
            group.userData.color = color;
            return group;
        }

        // Initialize enemy pool
        for (let i = 0; i < 40; i++) {
            const enemy = createEnemy();
            scene.add(enemy);
            enemyPool.push(enemy);
        }

        function spawnEnemy() {
            let enemy = enemyPool.pop();
            if (!enemy) {
                enemy = createEnemy();
                scene.add(enemy);
            }

            enemy.position.x = (Math.random() - 0.5) * 35;
            enemy.position.y = (Math.random() - 0.5) * 20;
            enemy.position.z = -220 - Math.random() * 50;
            enemy.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, Math.random() * Math.PI);
            enemy.userData.speed = (0.4 + Math.random() * 0.3) * difficulty;
            enemy.userData.rotSpeed = new THREE.Vector3(
                (Math.random() - 0.5) * 0.08,
                (Math.random() - 0.5) * 0.08,
                (Math.random() - 0.5) * 0.08
            );
            enemy.visible = true;
            activeEnemies.push(enemy);
        }

        // Create Particle
        function createParticle() {
            const geometries = [
                new THREE.TetrahedronGeometry(0.08),
                new THREE.BoxGeometry(0.1, 0.1, 0.1),
                new THREE.OctahedronGeometry(0.06)
            ];
            const geometry = geometries[Math.floor(Math.random() * geometries.length)];
            const material = new THREE.MeshBasicMaterial({
                color: 0xffffff,
                transparent: true
            });
            const particle = new THREE.Mesh(geometry, material);
            particle.visible = false;
            return particle;
        }

        // Initialize particle pool
        for (let i = 0; i < 800; i++) {
            const particle = createParticle();
            scene.add(particle);
            particlePool.push(particle);
        }

        function createExplosion(position, color) {
            const particleCount = 40 + Math.floor(Math.random() * 20);

            for (let i = 0; i < particleCount; i++) {
                let particle = particlePool.pop();
                if (!particle) {
                    particle = createParticle();
                    scene.add(particle);
                }

                particle.position.copy(position);
                particle.position.add(new THREE.Vector3(
                    (Math.random() - 0.5) * 0.5,
                    (Math.random() - 0.5) * 0.5,
                    (Math.random() - 0.5) * 0.5
                ));

                // Vary colors
                const colorVariation = Math.random();
                if (colorVariation < 0.3) {
                    particle.material.color.set(0xffffff);
                } else if (colorVariation < 0.6) {
                    particle.material.color.set(color);
                } else {
                    particle.material.color.set(0xff6600);
                }

                particle.material.opacity = 1;
                particle.visible = true;
                particle.scale.setScalar(0.5 + Math.random() * 1.5);

                const speed = 0.2 + Math.random() * 0.6;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.random() * Math.PI;

                particle.userData.velocity = new THREE.Vector3(
                    Math.sin(phi) * Math.cos(theta) * speed,
                    Math.sin(phi) * Math.sin(theta) * speed,
                    Math.cos(phi) * speed
                );
                particle.userData.life = 1;
                particle.userData.decay = 1.5 + Math.random();
                particle.userData.rotSpeed = new THREE.Vector3(
                    (Math.random() - 0.5) * 0.3,
                    (Math.random() - 0.5) * 0.3,
                    (Math.random() - 0.5) * 0.3
                );

                activeParticles.push(particle);
            }
        }

        function updateParticles(delta) {
            for (let i = activeParticles.length - 1; i >= 0; i--) {
                const particle = activeParticles[i];

                particle.position.add(particle.userData.velocity);
                particle.userData.velocity.multiplyScalar(0.96);
                particle.userData.life -= delta * particle.userData.decay;
                particle.material.opacity = Math.max(0, particle.userData.life);
                particle.scale.multiplyScalar(0.98);

                particle.rotation.x += particle.userData.rotSpeed.x;
                particle.rotation.y += particle.userData.rotSpeed.y;
                particle.rotation.z += particle.userData.rotSpeed.z;

                if (particle.userData.life <= 0) {
                    particle.visible = false;
                    activeParticles.splice(i, 1);
                    particlePool.push(particle);
                }
            }
        }

        function checkCollisions() {
            const shipBox = new THREE.Box3().setFromObject(spaceship);
            shipBox.expandByScalar(-0.3);

            for (let i = activeLasers.length - 1; i >= 0; i--) {
                const laser = activeLasers[i];
                const laserPos = laser.position.clone();

                for (let j = activeEnemies.length - 1; j >= 0; j--) {
                    const enemy = activeEnemies[j];
                    const enemyBox = new THREE.Box3().setFromObject(enemy);

                    if (enemyBox.containsPoint(laserPos)) {
                        createExplosion(enemy.position.clone(), enemy.userData.color);

                        laser.visible = false;
                        activeLasers.splice(i, 1);
                        laserPool.push(laser);

                        enemy.visible = false;
                        activeEnemies.splice(j, 1);
                        enemyPool.push(enemy);

                        score += 100;
                        document.getElementById('score').textContent = score.toLocaleString();

                        // Increase difficulty
                        difficulty = Math.min(2, 1 + score / 5000);
                        break;
                    }
                }
            }

            for (let i = activeEnemies.length - 1; i >= 0; i--) {
                const enemy = activeEnemies[i];
                const enemyBox = new THREE.Box3().setFromObject(enemy);

                if (enemyBox.intersectsBox(shipBox)) {
                    createExplosion(spaceship.position.clone(), 0x00ffff);
                    gameOver();
                    return;
                }
            }
        }

        function gameOver() {
            gameActive = false;
            document.getElementById('game-over').style.display = 'flex';
            document.getElementById('final-score').textContent = 'SCORE: ' + score.toLocaleString();
        }

        function restart() {
            score = 0;
            difficulty = 1;
            document.getElementById('score').textContent = '0';

            activeLasers.forEach(laser => {
                laser.visible = false;
                laserPool.push(laser);
            });
            activeLasers.length = 0;

            activeEnemies.forEach(enemy => {
                enemy.visible = false;
                enemyPool.push(enemy);
            });
            activeEnemies.length = 0;

            activeParticles.forEach(particle => {
                particle.visible = false;
                particlePool.push(particle);
            });
            activeParticles.length = 0;

            spaceship.position.set(0, 0, 8);
            spaceship.rotation.set(0, 0, 0);
            shipTargetX = 0;
            shipTargetY = 0;
            shipVelX = 0;
            shipVelY = 0;

            document.getElementById('game-over').style.display = 'none';
            gameActive = true;
        }

        document.getElementById('restart-btn').addEventListener('click', restart);

        // Keyboard input
        document.addEventListener('keydown', (e) => {
            keys[e.code] = true;
            if (e.code === 'Space') {
                e.preventDefault();
                firePressed = true;
            }
        });

        document.addEventListener('keyup', (e) => {
            keys[e.code] = false;
            if (e.code === 'Space') {
                firePressed = false;
            }
        });

        // Mobile detection
        function detectMobile() {
            return 'ontouchstart' in window || navigator.maxTouchPoints > 0;
        }

        isMobile = detectMobile();
        if (isMobile) {
            document.body.classList.add('mobile');
        }

        // Joystick handling
        const joystickContainer = document.getElementById('joystick-container');
        const joystickBase = document.getElementById('joystick-base');
        const joystickStick = document.getElementById('joystick-stick');
        const fireZone = document.getElementById('fire-zone');
        let joystickActive = false;
        let joystickTouchId = null;

        function handleJoystickStart(e) {
            e.preventDefault();
            const touch = e.changedTouches[0];
            joystickActive = true;
            joystickTouchId = touch.identifier;
            joystickStick.classList.add('active');
            updateJoystick(touch);
        }

        function handleJoystickMove(e) {
            e.preventDefault();
            for (let touch of e.changedTouches) {
                if (touch.identifier === joystickTouchId) {
                    updateJoystick(touch);
                    break;
                }
            }
        }

        function handleJoystickEnd(e) {
            for (let touch of e.changedTouches) {
                if (touch.identifier === joystickTouchId) {
                    joystickActive = false;
                    joystickTouchId = null;
                    joystickState.x = 0;
                    joystickState.y = 0;
                    joystickStick.style.transform = 'translate(-50%, -50%)';
                    joystickStick.classList.remove('active');
                    break;
                }
            }
        }

        function updateJoystick(touch) {
            const rect = joystickBase.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;

            let deltaX = touch.clientX - centerX;
            let deltaY = touch.clientY - centerY;

            const maxRadius = rect.width / 2 - 27;
            const distance = Math.sqrt(deltaX * deltaX + deltaY * deltaY);

            if (distance > maxRadius) {
                deltaX = (deltaX / distance) * maxRadius;
                deltaY = (deltaY / distance) * maxRadius;
            }

            joystickState.x = deltaX / maxRadius;
            joystickState.y = -deltaY / maxRadius;

            joystickStick.style.transform = `translate(calc(-50% + ${deltaX}px), calc(-50% + ${deltaY}px))`;
        }

        joystickBase.addEventListener('touchstart', handleJoystickStart, { passive: false });
        document.addEventListener('touchmove', handleJoystickMove, { passive: false });
        document.addEventListener('touchend', handleJoystickEnd, { passive: false });
        document.addEventListener('touchcancel', handleJoystickEnd, { passive: false });

        // Fire zone
        fireZone.addEventListener('touchstart', (e) => {
            e.preventDefault();
            fireZone.classList.add('active');
            if (gameActive) fireLaser();
        });

        fireZone.addEventListener('touchend', () => {
            fireZone.classList.remove('active');
        });

        // Right side tap to fire
        document.addEventListener('touchstart', (e) => {
            const touch = e.touches[0];
            if (touch.clientX > window.innerWidth * 0.6 &&
                !e.target.closest('#fire-zone') &&
                !e.target.closest('#joystick-container') &&
                e.target.tagName !== 'BUTTON') {
                if (gameActive) fireLaser();
            }
        });

        // Enemy spawn timer
        let enemySpawnTimer = 0;
        let baseSpawnRate = 0.7;

        // Animation loop
        const clock = new THREE.Clock();
        let time = 0;

        function animate() {
            requestAnimationFrame(animate);

            const delta = Math.min(clock.getDelta(), 0.05);
            time += delta;

            if (gameActive) {
                // Ship movement with acceleration
                const accel = 0.025;
                const friction = 0.92;
                const maxSpeed = 0.45;

                if (keys['ArrowLeft'] || keys['KeyA']) shipVelX -= accel;
                if (keys['ArrowRight'] || keys['KeyD']) shipVelX += accel;
                if (keys['ArrowUp'] || keys['KeyW']) shipVelY += accel;
                if (keys['ArrowDown'] || keys['KeyS']) shipVelY -= accel;

                // Joystick input
                shipVelX += joystickState.x * accel * 1.5;
                shipVelY += joystickState.y * accel * 1.5;

                // Apply friction
                shipVelX *= friction;
                shipVelY *= friction;

                // Clamp velocity
                shipVelX = Math.max(-maxSpeed, Math.min(maxSpeed, shipVelX));
                shipVelY = Math.max(-maxSpeed, Math.min(maxSpeed, shipVelY));

                // Update target
                shipTargetX += shipVelX;
                shipTargetY += shipVelY;

                // Clamp position
                const boundsX = 14;
                const boundsY = 9;
                shipTargetX = Math.max(-boundsX, Math.min(boundsX, shipTargetX));
                shipTargetY = Math.max(-boundsY, Math.min(boundsY, shipTargetY));

                // Smooth lerp
                spaceship.position.x += (shipTargetX - spaceship.position.x) * 0.12;
                spaceship.position.y += (shipTargetY - spaceship.position.y) * 0.12;

                // Ship banking
                spaceship.rotation.z = -shipVelX * 3;
                spaceship.rotation.x = shipVelY * 1.5;

                // Engine trail animation
                const trailScale = 0.8 + Math.abs(shipVelX + shipVelY) * 0.5 + Math.sin(time * 25) * 0.15;
                if (spaceship.userData.leftTrail) {
                    spaceship.userData.leftTrail.scale.set(trailScale, trailScale, trailScale);
                    spaceship.userData.rightTrail.scale.set(trailScale, trailScale, trailScale);
                }

                // Fire
                if (firePressed && gameActive) {
                    fireLaser();
                }

                // Update lasers
                for (let i = activeLasers.length - 1; i >= 0; i--) {
                    const laser = activeLasers[i];
                    laser.position.z -= laser.userData.speed;

                    if (laser.position.z < -230) {
                        laser.visible = false;
                        activeLasers.splice(i, 1);
                        laserPool.push(laser);
                    }
                }

                // Spawn enemies
                const spawnRate = baseSpawnRate / difficulty;
                enemySpawnTimer += delta;
                if (enemySpawnTimer >= spawnRate) {
                    enemySpawnTimer = 0;
                    spawnEnemy();
                    // Occasionally spawn multiple
                    if (Math.random() < 0.3 * difficulty) {
                        setTimeout(spawnEnemy, 200);
                    }
                }

                // Update enemies
                for (let i = activeEnemies.length - 1; i >= 0; i--) {
                    const enemy = activeEnemies[i];
                    enemy.position.z += enemy.userData.speed;
                    enemy.rotation.x += enemy.userData.rotSpeed.x;
                    enemy.rotation.y += enemy.userData.rotSpeed.y;
                    enemy.rotation.z += enemy.userData.rotSpeed.z;

                    if (enemy.position.z > 25) {
                        enemy.visible = false;
                        activeEnemies.splice(i, 1);
                        enemyPool.push(enemy);
                    }
                }

                checkCollisions();
                updateParticles(delta);
            } else {
                updateParticles(delta);
            }

            // Update shaders
            starfield.material.uniforms.time.value = time;
            nebulaMaterial.uniforms.time.value = time;
            sunMaterial.uniforms.time.value = time;
            gridMaterial.uniforms.time.value = time;

            // Animate starfield
            const positions = starfield.geometry.attributes.position.array;
            for (let i = 0; i < positions.length; i += 3) {
                positions[i + 2] += 0.8;
                if (positions[i + 2] > 50) {
                    positions[i + 2] = -500 - Math.random() * 100;
                    positions[i] = (Math.random() - 0.5) * 500;
                    positions[i + 1] = (Math.random() - 0.3) * 300;
                }
            }
            starfield.geometry.attributes.position.needsUpdate = true;

            // Camera slight movement
            camera.position.x = spaceship.position.x * 0.1;
            camera.position.y = 4 + spaceship.position.y * 0.05;

            composer.render();
        }

        function onResize() {
            const width = window.innerWidth;
            const height = window.innerHeight;

            camera.aspect = width / height;
            camera.updateProjectionMatrix();

            renderer.setSize(width, height);
            composer.setSize(width, height);

            bloomPass.resolution.set(width, height);
        }

        window.addEventListener('resize', onResize);

        // Prevent context menu on long press
        window.addEventListener('contextmenu', (e) => e.preventDefault());

        animate();
    </script>
